# Local-dev nginx vhost emulating the production app-machine config.
#
# Production reference:
#   prod_copy/upstage_backend/initial_scripts/nginx_templates/nginx_template_for_app_machines.conf
#
# Differences from production:
#   - Plain HTTP on :80 (no SSL, no certbot, no 80 -> 443 redirect).
#   - Serves the dev SPA bundle from /frontend_app_dev/dist/ (vs prod /frontend_app/dist/).
#   - Proxies /api/ to host port 3001 (the dev backend container's published port,
#     mapped 3001:3000 in upstage_backend/app_containers/docker-compose-dev.yaml).
#   - Serves /resources from /app_code_dev/uploads (vs prod /app_code/uploads).
#   - Drops set_real_ip_from blocks; localhost is the only client.
#   - MQTT broker is hit directly on its own port (e.g. ws://localhost:2096),
#     not proxied through this vhost.
#
# Install (Fedora):
#   sudo cp upstage-local.conf /etc/nginx/conf.d/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Install (Debian/Ubuntu):
#   sudo cp upstage-local.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/upstage-local.conf /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Prereqs before reload:
#   - /frontend_app_dev/dist/ exists and is populated by run_front_end_dev.sh.
#   - /app_code_dev/uploads/ exists.
#   - The dev backend container is up and listening on host port 3001.
#   - The stock distro default vhost does NOT also claim default_server. On
#     Fedora that is the `listen 80 default_server;` server block in
#     /etc/nginx/nginx.conf; remove the `default_server` flag (or the whole
#     block) before reloading. On Debian/Ubuntu, disable
#     /etc/nginx/sites-enabled/default. If you skip this step `nginx -t` will
#     fail with "a duplicate default server".
#
# Then visit http://localhost/ or http://127.0.0.1/ in a browser.

server {
    # default_server so requests to 127.0.0.1, ::1, the LAN IP, etc. all land
    # here regardless of Host header. If `nginx -t` complains about a duplicate
    # default_server, remove (or comment out) the `default_server` flag in the
    # stock Fedora server block in /etc/nginx/nginx.conf, or delete
    # /etc/nginx/conf.d/default.conf if your distro ships one.
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost 127.0.0.1 _;

    add_header Referrer-Policy "no-referrer";

    client_body_in_file_only clean;
    client_body_buffer_size 32K;
    client_max_body_size 500M;

    send_timeout 180s;

    location / {
        alias /frontend_app_dev/dist/;
        try_files $uri $uri/ /index.html;
        add_header Last-Modified $date_gmt;
        add_header 'Cache-Control' 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
        expires -1;
        etag off;
        gzip on;
        gzip_types *;
        gzip_proxied no-cache no-store private expired auth;
        gzip_min_length 1000;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    location /resources {
        alias /app_code_dev/uploads;
        expires off;
        add_header Cache-Control 'no-cache, must-revalidate';
    }
}
