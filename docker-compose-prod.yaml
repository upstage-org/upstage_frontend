name: upstage-frontend-prod
services:
  upstage_frontend_prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: upstage/frontend:local
    container_name: upstage_frontend
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - .:/app
      - /frontend_app/dist:/app/dist
    working_dir: /app
    command: >
      /bin/sh -c "
      rm -rf /app/.env &&
      cat /app/dist/.env > /app/.env &&
      pnpm install --frozen-lockfile &&
      pnpm build &&
      tail -f /dev/null
      "
