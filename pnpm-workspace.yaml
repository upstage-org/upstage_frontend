# Dependency lifecycle scripts allowed during install (pnpm 11 strict dep builds).
# See https://pnpm.io/cli/approve-builds and ERR_PNPM_IGNORED_BUILDS when building in Docker/CI.
allowBuilds:
  "@fortawesome/fontawesome-free": true
  "@parcel/watcher": true
  core-js: true
  esbuild: true
  vue-demi: true

# pnpm 11+ reads overrides here (not package.json#pnpm).
overrides:
  lodash: 4.18.1
  lodash@<=4.17.23: 4.18.1
  brace-expansion@>=1.0.0 <=1.1.11: 1.1.14
  brace-expansion@>=2.0.0 <=2.0.1: 2.0.2
  brace-expansion@<1.1.13: 1.1.14
  brace-expansion@>=2.0.0 <2.0.3: 2.0.3
  esbuild@<=0.24.2: 0.25.0
  esbuild@>=0.27.3 <0.28.1: 0.28.1
  form-data@>=4.0.0 <4.0.6: 4.0.6
  follow-redirects@<=1.15.11: 1.16.0
  glob@>=10.2.0 <10.5.0: 10.5.0
  immutable@>=5.0.0 <5.1.5: 5.1.5
  js-yaml@<3.15.0: 3.15.0
  js-yaml@>=4.0.0 <4.2.0: 4.2.0
  linkifyjs@<4.3.2: 4.3.2
  lodash-es@<=4.17.23: 4.18.1
  js-cookie: 3.0.8
  js-cookie@<=3.0.5: 3.0.8
  markdown-it@>=13.0.0 <14.1.1: 14.1.1
  minimatch@<3.1.4: 3.1.4
  minimatch@>=9.0.0 <9.0.7: 9.0.7
  picomatch@<2.3.2: 2.3.2
  picomatch@>=4.0.0 <4.0.4: 4.0.4
  qs@<6.15.2: 6.15.2
  rollup@>=4.0.0 <4.59.0: 4.59.0
  undici@<6.27.0: 6.27.0
  undici@5: 6.27.0
  undici@>=7.0.0 <7.28.0: 7.28.0
  ws: ^8.20.1
  yaml@>=2.0.0 <2.8.3: 2.8.3

# Upstream peer ranges lag behind our pinned toolchain (eslint 10, typescript 6, tailwindcss 4).
peerDependencyRules:
  allowedVersions:
    eslint: "10"
    typescript: "6"
    tailwindcss: "4"
