name: upstage-frontend-dev
services:
  upstage_frontend_dev:
    image: node:22-bookworm
    container_name: upstage_frontend_dev
    volumes:
      - .:/app
      - /frontend_app_dev/dist:/app/dist
    working_dir: /app
    command: >
      /bin/sh -c "
      rm -rf /app/.env &&
      cat /app/dist/.env > /app/.env &&
      corepack enable &&
      corepack prepare pnpm@10.7.1 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm build:dev &&
      tail -f /dev/null
      "
