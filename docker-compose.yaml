name: upstage-frontend-${SITE}

# Frontend build output is baked in at docker build (see x-common-build). No bind mounts for sources or dist.

# ====================== Common Build (Simplified & Reliable) ======================
x-common-build: &common_build |
  # syntax=docker/dockerfile:1
  FROM node:22-bookworm AS builder

  ENV PNPM_HOME=/usr/local/pnpm \
      COREPACK_HOME=/usr/local/corepack \
      PATH=/usr/local/pnpm:/usr/local/corepack/shims:$$PATH

  RUN mkdir -p "$$PNPM_HOME" "$$COREPACK_HOME/shims" \
   && corepack enable --install-directory "$$COREPACK_HOME/shims" \
   && corepack prepare pnpm@10.7.1 --activate

  WORKDIR /usr/app

  COPY package.json pnpm-lock.yaml ./
  RUN pnpm install --frozen-lockfile

  COPY . .

  ARG SITE
  # VITE_E2E is consumed by `vite build` (Vite's loadEnv merges process.env on
  # top of `.env`) so the bundle exposes window.__UPSTAGE_STORE__ for the
  # Playwright e2e:perform suite. We pass it through here (not via `.env`) to
  # keep the dev/prod toggle out of the persisted env files.
  # All other VITE_* vars (MQTT endpoint/credentials, GraphQL, static assets,
  # …) come from `.env` in the build context — `.dockerignore` MUST allow it.
  ARG VITE_E2E
  ENV VITE_E2E=$$VITE_E2E
  RUN if [ "$$SITE" = "dev" ]; then \
        pnpm run build:dev; \
      else \
        pnpm run build; \
      fi

  # === Runtime stage ===
  FROM node:22-bookworm-slim

  WORKDIR /usr/app

  COPY container-runtime/package.json container-runtime/package-lock.json ./
  RUN npm ci --omit=dev --ignore-scripts \
      && npm cache clean --force

  COPY container-runtime/static-api-server.mjs ./
  COPY --from=builder /usr/app/dist ./dist

  RUN chown -R 1000:1000 /usr/app

  USER 1000:1000

  CMD ["node", "static-api-server.mjs"]

# ====================== Services ======================
services:
  upstage_frontend:
    build:
      context: .
      dockerfile_inline: *common_build
      args:
        SITE: "${SITE}"
        VITE_E2E: "${VITE_E2E:-}"
    image: upstage/frontend:local
    container_name: upstage_frontend_${SITE}
    user: "${HOST_UID}:${HOST_GID}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:4173"
    environment:
      # Reverse-proxy /api → studio backend. Default: same Docker network as app_containers
      # (service `upstage_backend`, container port 3000 — not the host-mapped APP_PORT).
      # If the API runs on the host instead, set e.g. http://host.docker.internal:3001
      # (use host.docker.internal, not 172.17.0.1 — custom bridges often cannot reach docker0).
      VITE_STUDIO_API_PROXY: "${VITE_STUDIO_API_PROXY:-http://upstage_backend:3000}"
      STATIC_API_LISTEN_PORT: "4173"
      FRONTEND_PORT: "${FRONTEND_PORT}"
    networks:
      - upstage-network
    working_dir: /usr/app

networks:
  upstage-network:
    name: upstage-network-${SITE}
    driver: bridge
    external: true
