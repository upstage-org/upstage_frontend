name: upstage-frontend-${SITE}

# Frontend container is a one-shot build extractor: on `docker compose run --rm`
# it builds the SPA (already baked at image-build time), copies the resulting
# `dist/` into the host directory bind-mounted at /output, then exits 0.
# Nothing serves the SPA from this container. Serving is done elsewhere:
#   - Local --serve mode (run_front_end_*.sh --serve): pnpm run dev on the host.
#   - Local --build (default) / remote: host nginx aliases /frontend_app_${SITE}/dist.
# Source code is baked into the builder image (no bind mounts for sources).

# ====================== Common Build (Simplified & Reliable) ======================
x-common-build: &common_build |
  # syntax=docker/dockerfile:1
  FROM node:22-bookworm AS builder

  ENV PNPM_HOME=/usr/local/pnpm \
      COREPACK_HOME=/usr/local/corepack \
      PATH=/usr/local/pnpm:/usr/local/corepack/shims:$$PATH

  RUN mkdir -p /usr/local/pnpm /usr/local/corepack/shims \
   && corepack enable --install-directory /usr/local/corepack/shims \
   && corepack prepare pnpm@11.1.2 --activate

  WORKDIR /usr/app

  COPY package.json pnpm-lock.yaml pnpm-workspace.yaml ./
  RUN pnpm install --frozen-lockfile

  COPY . .

  ARG SITE
  # VITE_E2E is consumed by `vite build` (Vite's loadEnv merges process.env on
  # top of `.env`) so the bundle exposes window.__UPSTAGE_STORE__ for the
  # Playwright e2e:perform suite. We pass it through here (not via `.env`) to
  # keep the dev/prod toggle out of the persisted env files.
  # All other VITE_* vars (MQTT endpoint/credentials, GraphQL, static assets,
  # …) come from `.env` in the build context — `.dockerignore` MUST allow it.
  ARG VITE_E2E
  ENV VITE_E2E=$$VITE_E2E

  # CACHE_BUST is set to a per-run timestamp by run_front_end_*.sh so the next
  # RUN (and therefore `vite build`) always re-executes even when no source
  # file changed. Earlier layers (base image, pnpm install, COPY . .) remain
  # cache-hit, keeping the rebuild fast for the common case.
  ARG CACHE_BUST
  RUN echo "vite build at $$CACHE_BUST"

  RUN if [ "$$SITE" = "dev" ]; then \
        pnpm run build:dev; \
      else \
        pnpm run build; \
      fi

  # Make the baked dist world-readable so the runtime container (which runs as
  # the host's UID:GID via the compose `user:` override) can copy it out.
  RUN chmod -R a+rX /usr/app/dist

  # === Runtime stage: build extractor ===
  # Tiny debian image; on container start it clears /output (bind-mounted from
  # the host) and copies the baked /built-dist into it, then exits 0.
  FROM debian:bookworm-slim

  COPY --from=builder /usr/app/dist /built-dist

  CMD ["bash", "-c", "set -e; rm -rf /output/* /output/.[!.]* /output/..?* 2>/dev/null || true; cp -a /built-dist/. /output/; echo \"built dist copied to /output\""]

# ====================== Services ======================
services:
  upstage_frontend:
    build:
      context: .
      dockerfile_inline: *common_build
      args:
        SITE: "${SITE}"
        VITE_E2E: "${VITE_E2E:-}"
        # Set per-run by run_front_end_*.sh to force the vite-build layer to
        # re-execute every time (see CACHE_BUST in the inline Dockerfile).
        CACHE_BUST: "${CACHE_BUST:-0}"
    # Per-site tag: dev and prod must never share an image — different SITE
    # values pick different `vite build` modes (build:dev vs build) and load
    # different `.env` files at build time, producing materially different
    # bundles. Sharing the tag would let one run silently clobber the other.
    image: upstage/frontend:${SITE}
    container_name: upstage_frontend_${SITE}
    # Run as the host's UID:GID so the dist/ files written to /output are
    # owned by the dev user (or whatever the host nginx runs as) and not root.
    user: "${HOST_UID}:${HOST_GID}"
    volumes:
      # Host path is created + chowned by the run_front_end_*.sh script before
      # `docker compose run`. The container clears it and refills with the
      # freshly-built dist on each invocation.
      # `:z` tells Docker to relabel the host directory to the shared SELinux
      # `container_file_t` type so the container (running as ${HOST_UID}:${HOST_GID})
      # can write into it on Fedora/RHEL with SELinux enforcing. Without this,
      # the in-container `cp -a` is denied by policy before UID/GID is even
      # checked, and /frontend_app_${SITE}/dist stays empty. `:z` (shared) lets
      # host nginx read the files afterwards; `:Z` (private) would lock them.
      - /frontend_app_${SITE}/dist:/output:z
    restart: "no"
